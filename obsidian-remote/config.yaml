name: Home Assistant Obsidian Remote
version: "0.1"
slug: ha-obsidian-remote
description: Runs Obsidian within your Home Assistant setup providing integration of live-features
url: https://github.com/crazyrokr/ha-obsidian-remote
webui: http://[HOST]:[PORT:8080]
arch:
  - aarch64
  - amd64
init: false
map:
  - type: addon_config
    read_only: False
    path: /config
  - type: data
    read_only: False
    path: /vaults
ingress: true
ingress_port: 8080
ports:
  8080/tcp: 8080
